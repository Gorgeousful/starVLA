run_id: starvla
run_root_dir: playground/Checkpoints
seed: 42
wandb_entity: null
wandb_project: null
is_debug: false
version_id: "0.21"

framework:
  name: QwenPI_v3 # QwenOFT/QwenFAST/QwenPI/QwenGR00T
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  # ki:
  #   flow_loss_weight: 1.0
  #   fast_loss_weight: 1.0
  #   detach_vlm_for_flow: true
  #   gripper_state_only: true
  # delta_mem:
  #   enabled: true
  #   adapter_layers: null
  #   rank: 8
  #   alpha: 16.0
  #   delta_heads: ["q", "o"]
  #   history_write_mode: frame_mean
  #   output_init: zero
  action_model:
    action_dim: 7
    state_dim: 7
    # actions[:, -self.action_horizon:, :]. The number should be less than the number defined in data_config.py
    action_horizon: 8 

datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: playground/Datasets/LEROBOT_LIBERO_DATA
    data_mix: libero_all
    action_type: delta_qpos
    sequential_step_sampling: False
    # CoT_prompt: "Given: {instruction}\nPredict: [ACTION]"
    CoT_prompt: "Given:\n[TASK] {instruction}\n[STATE] {state}\n\nPredict:\n[ACTION]"
    per_device_batch_size: 16
    load_all_data_for_training: true
    video_backend: torchvision_av
    image_flip: horizontal
    include_state: true
    # custom_annotation:
    #   enabled: true
    #   include_gripper: true
    #   delta_indices: [0] # [8] [0,8]
    #   bbox_size: [256, 256]

trainer:
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 2.0e-04 # LoRA finetuning, Qwen3-VL official default   1e-5 for all parameters
    project_layers: 1.0e-04 # VLM-Projector-ActionModel
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: '' # 'qwen_vl_interface'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  save_ckpt_only: false #!
  is_resume: false #!
  gradient_clipping: 1.0
  gradient_checkpointing: true
  lora:
    enabled: true
    rank: 32 # default 64
    alpha: 64.0 # default 128
    dropout: 0.05
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
